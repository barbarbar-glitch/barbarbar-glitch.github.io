<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My First Proper Webpage</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="top-bar">
        <div class="brand">
          <span class="brand-square"></span>
          <span class="brand-name">MY PAGE</span>
        </div>
        <nav class="nav">
          <a
            href="https://instagram.com/baarrriiiii"
            target="_blank"
            rel="noopener noreferrer"
            class="nav-link"
          >
            ABOUT
          </a>
        </nav>
      </header>

      <main>
        <section class="hero">
          <div class="hero-text">
            <h1 class="hero-title">
              HI, THIS IS MY FIRST PROPER WEBPAGE
            </h1>
            <p class="hero-subtitle">
              Hustlers don't stop, they keep goin', You can lose your life, but
              it's gon' keep goin'.
            </p>
            <div class="hero-actions">
              <a
                href="https://instagram.com/baarrriiiii"
                target="_blank"
                rel="noopener noreferrer"
                class="btn btn-primary"
              >
                VISIT MY INSTAGRAM
              </a>
              <a
                href="https://open.spotify.com/track/4cg1yakyRSIOjxKM2I7J1q?si=75a7f8548874430e"
                target="_blank"
                rel="noopener noreferrer"
                class="btn btn-secondary"
              >
                PLAY SONG
              </a>
            </div>
          </div>
          <div class="hero-graphic-wrapper">
            <div class="hero-graphic">
              <!--
                Replace knight.png with your own 2D black-and-white medieval
                knight image (holding a sword). Place it in the same folder and
                update the CSS background-image in styles.css if needed.
              -->
            </div>
            <details class="spotify-dropdown">
              <summary class="spotify-summary">ABOUT ME</summary>
              <div class="spotify-panel">
                <iframe
                  src="https://open.spotify.com/embed/track/4cg1yakyRSIOjxKM2I7J1q?utm_source=generator"
                  title="Spotify player"
                  loading="lazy"
                  allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                ></iframe>
              </div>
            </details>
          </div>
        </section>

        <footer class="site-footer">
          <div class="footer-tags">
            <span>CREATIVITY</span>
            <span>DESIGN</span>
            <span>WEB</span>
            <span>EXPERIMENT</span>
          </div>
          <p class="footer-note">
            Built by me as my first proper webpage.
          </p>
        </footer>
      </main>
    </div>
  </body>
</html>
